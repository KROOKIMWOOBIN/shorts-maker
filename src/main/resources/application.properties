# ???????????????????????????????????????????????????
#  ?? ??
# ???????????????????????????????????????????????????
server.port=8080

# [??] ?? ??? ?? ?? ?? ???? ??
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# Tomcat ??? ? ??? (?? 200 ? ??? ?? ??)
# ?? ??? CPU-bound??? ???? ?? ??
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=20
server.tomcat.connection-timeout=30000

# ?? (JSON ?? gzip: ?? ?? ?? ?? ??)
server.compression.enabled=true
server.compression.mime-types=application/json,text/html
server.compression.min-response-size=512

# ???????????????????????????????????????????????????
#  JSP
# ???????????????????????????????????????????????????
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ???????????????????????????????????????????????????
#  Ollama ??
# ???????????????????????????????????????????????????
ollama.api.url=http://localhost:11434/api/generate
ollama.model=gemma3
ollama.timeout=120

# ???????????????????????????????????????????????????
#  ?? ??
# ???????????????????????????????????????????????????
output.audio.dir=outputs/audio
output.video.dir=outputs/videos
output.thumbnail.dir=outputs/thumbnails

# ?? ?? ?? (??? ??/???)
spring.web.resources.static-locations=file:outputs/,classpath:/static/

# ???????????????????????????????????????????????????
#  ?? ???
# ???????????????????????????????????????????????????
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ???????????????????????????????????????????????????
#  ??? ??
# ???????????????????????????????????????????????????
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=10
spring.task.execution.thread-name-prefix=shorts-gen-
spring.task.scheduling.pool.size=2


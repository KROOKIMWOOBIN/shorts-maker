# ═══════════════════════════════════════════════════
#  서버 설정
# ═══════════════════════════════════════════════════
server.port=8080
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=20
server.tomcat.connection-timeout=30000
server.compression.enabled=true
server.compression.mime-types=application/json,text/html
server.compression.min-response-size=512

# ═══════════════════════════════════════════════════
#  JSP
# ═══════════════════════════════════════════════════
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ═══════════════════════════════════════════════════
#  Ollama
# ═══════════════════════════════════════════════════
ollama.api.url=http://localhost:11434/api/generate
ollama.model=gemma3
ollama.timeout=120

# ═══════════════════════════════════════════════════
#  ComfyUI (AnimateDiff)
# ═══════════════════════════════════════════════════
comfyui.api.url=http://localhost:8188
comfyui.timeout=300

# ═══════════════════════════════════════════════════
#  출력 경로 (썸네일 제거)
# ═══════════════════════════════════════════════════
output.audio.dir=outputs/audio
output.video.dir=outputs/videos
output.clips.dir=outputs/clips
output.bgm.generated.dir=outputs/bgm_generated

# 정적 파일 서빙
spring.web.resources.static-locations=file:outputs/,classpath:/static/,file:src/main/webapp/static/

# ═══════════════════════════════════════════════════
#  파일 업로드
# ═══════════════════════════════════════════════════
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ═══════════════════════════════════════════════════
#  비동기
# ═══════════════════════════════════════════════════
spring.task.execution.pool.core-size=3
spring.task.execution.pool.max-size=6
spring.task.execution.pool.queue-capacity=10
spring.task.execution.thread-name-prefix=shorts-gen-
spring.task.scheduling.pool.size=2

# ═══════════════════════════════════════════════════
#  로깅
# ═══════════════════════════════════════════════════
logging.level.com.aishots=INFO
logging.level.org.springframework.web=WARN
logging.level.org.bytedeco=ERROR

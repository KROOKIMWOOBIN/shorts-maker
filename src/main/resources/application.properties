# ═══════════════════════════════════════════════════
#  서버 설정
# ═══════════════════════════════════════════════════
server.port=8080

# [보안] 오류 응답에 내부 정보 절대 포함하지 않음
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# Tomcat 스레드 풀 최적화 (기본 200 → 저사양 환경 맞춤)
# 영상 생성은 CPU-bound이므로 스레드를 적게 유지
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=20
server.tomcat.connection-timeout=30000

# 압축 (JSON 응답 gzip: 상태 폴링 응답 크기 절감)
server.compression.enabled=true
server.compression.mime-types=application/json,text/html
server.compression.min-response-size=512

# ═══════════════════════════════════════════════════
#  JSP
# ═══════════════════════════════════════════════════
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ═══════════════════════════════════════════════════
#  Ollama 설정
# ═══════════════════════════════════════════════════
ollama.api.url=http://localhost:11434/api/generate
ollama.model=gemma3
ollama.timeout=120

# ═══════════════════════════════════════════════════
#  출력 경로
# ═══════════════════════════════════════════════════
output.audio.dir=outputs/audio
output.video.dir=outputs/videos

# 정적 파일 서빙 (생성된 영상/썸네일)
spring.web.resources.static-locations=file:outputs/,classpath:/static/,file:src/main/webapp/static/

# ═══════════════════════════════════════════════════
#  파일 업로드
# ═══════════════════════════════════════════════════
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ═══════════════════════════════════════════════════
#  비동기 설정
# ═══════════════════════════════════════════════════
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=10
spring.task.execution.thread-name-prefix=shorts-gen-
spring.task.scheduling.pool.size=2

# ═══════════════════════════════════════════════════
#  로깅
# ═══════════════════════════════════════════════════
logging.level.com.aishots=INFO
logging.level.org.springframework.web=WARN
# FFmpeg 로그 억제
logging.level.org.bytedeco=ERROR
logging.level.org.java_websocket=WARN
# BGM 폴더 (mp3/wav — 없으면 자동 스킵)
output.bgm.dir=bgm

# ═══════════════════════════════════════════════════
#  ComfyUI (AnimateDiff)
# ═══════════════════════════════════════════════════
comfyui.api.url=http://localhost:8188
comfyui.timeout=300

# ═══════════════════════════════════════════════════
#  AI 생성 경로
# ═══════════════════════════════════════════════════
output.clips.dir=outputs/clips
output.bgm.generated.dir=outputs/bgm_generated

# ═══════════════════════════════════════════════════
#  Stable Diffusion (SD 이미지 생성)
# ═══════════════════════════════════════════════════
output.images.dir=outputs/images
sd.model=v1-5-pruned-emaonly.ckpt

# SD 생성 품질 설정 (steps 낮추면 빠름, 높이면 품질 좋음)
sd.steps=35
sd.cfg=8.0
